# ─── Intelli-Credit: Docker Compose ──────────────────────────────────────────
# Usage:
#   Development:  docker compose up --build
#   Production:   docker compose -f docker-compose.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ─── Redis (Shared State Store) ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: intelli-credit-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Backend API ───────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: intelli-credit-backend
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    env_file:
      - .env
    environment:
      # Override Redis URL to use Docker service name
      REDIS_URL: redis://redis:6379/0
    volumes:
      # Persist uploads and reports across restarts (dev convenience)
      - uploads_data:/app/uploads
      - reports_data:/app/reports
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-8000}/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    restart: unless-stopped

volumes:
  redis_data:
    driver: local
  uploads_data:
    driver: local
  reports_data:
    driver: local
